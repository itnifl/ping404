# Ping404 Game Server Configuration
# ===================================
# This file configures server-side game settings.
# Remove or comment out properties to use defaults.

# Win Score Settings
# ------------------
# Number of goals required to win (default: 5)
game.winScore=5

# Runtime Performance Targets (per room)
# --------------------------------------
# Simulation frequency for game physics update (Hz)
game.simulationTickHz=60

# Maximum broadcast frequency for state snapshots (Hz)
# Keep lower than simulation tick to reduce network load under pressure.
game.maxStateBroadcastHz=20

# Maximum acceptable loop jitter before warning (ms)
game.maxLoopJitterMs=10.0

# Metrics Settings
# ----------------
# Set to false to disable per-room metrics collection entirely (default: true)
metrics.enabled=true
