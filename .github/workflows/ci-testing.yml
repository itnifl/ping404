name: CI

on:
  push:
  pull_request:

jobs:
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run core, server, and kryonet-client-server tests
        run: ./gradlew :core:test :server:test :kryonet-client-server:test

      - name: Upload server HTML test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: server-test-report
          path: server/build/reports/tests/test/

      - name: Upload core HTML test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: core-test-report
          path: core/build/reports/tests/test/

      - name: Upload kryonet-client-server HTML test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kryonet-client-server-test-report
          path: kryonet-client-server/build/reports/tests/test/